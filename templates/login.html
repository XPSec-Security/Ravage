    <link rel="stylesheet" href="/assets/css/login.css">

<body class="text-gray-100 font-mono min-h-screen flex items-center justify-center p-6">
    <div class="fixed inset-0 -z-10 background-gradient"></div>
    
    <div class="floating-window p-8 w-full max-w-md relative z-10">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div id="flashMessages" class="mb-6">
                    {% for message in messages %}
                        <div class="bg-red-900 bg-opacity-50 border border-red-500 text-red-300 px-4 py-3 rounded-lg text-sm mb-2 flash-message">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                                </svg>
                                {{ message }}
                            </div>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form id="loginForm" method="POST" action="/login" class="space-y-6" novalidate>
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                    <svg class="w-4 h-4 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                    Operator
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    value=""
                    class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 transition-all duration-200" 
                    placeholder="Operator name"
                    autocomplete="off"
                    required
                />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                    <svg class="w-4 h-4 inline mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                    </svg>
                    Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    value=""
                    class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 transition-all duration-200" 
                    placeholder="Operator password"
                    autocomplete="off"
                    required
                />
            </div>

            <button 
                type="submit" 
                id="loginButton"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-medium py-3 px-4 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50"
            >
                <span class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm7.707 3.293a1 1 0 010 1.414L9.414 9H17a1 1 0 110 2H9.414l1.293 1.293a1 1 0 01-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                    Enter Dashboard
                </span>
            </button>
        </form>

        <div id="loadingState" class="hidden text-center py-4">
            <div class="inline-flex items-center gap-2 text-red-400">
                <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-red-400"></div>
                <span>Authenticating...</span>
            </div>
        </div>

    </div>

    <div class="fixed inset-0 -z-20 overflow-hidden">
        <div class="particles-container">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <script src="/assets/js/login.js"></script>
</body>
</html>
